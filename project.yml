name: Mara
options:
  bundleIdPrefix: com.aiscream
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
packages:
  MaraCore:
    path: MaraCore
targets:
  Mara:
    type: application
    platform: macOS
    sources: [App]
    dependencies:
      - package: MaraCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aiscream.Mara
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: App/Info.plist
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
