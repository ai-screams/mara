name: Mara
options:
  bundleIdPrefix: com.aiscream
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
packages:
  MaraCore:
    path: MaraCore
  # Package.resolved를 커밋하지 않는 리포이므로 exactVersion이 공급망 핀 역할을 한다.
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    exactVersion: 2.9.3
targets:
  Mara:
    type: application
    platform: macOS
    sources: [App]
    dependencies:
      - package: MaraCore
      - package: Sparkle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aiscream.Mara
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: App/Info.plist
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
