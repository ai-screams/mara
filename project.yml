name: Mara
options:
  bundleIdPrefix: com.aiscream
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
packages:
  MaraCore:
    path: MaraCore
  # 사람이 읽는 버전 제약. 불변 revision은 config/Package.resolved가 고정하고,
  # scripts/generate-project.sh가 생성 workspace에 복원한다.
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    exactVersion: 2.9.3
targets:
  Mara:
    type: application
    platform: macOS
    sources: [App]
    dependencies:
      - package: MaraCore
      - package: Sparkle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aiscream.Mara
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: App/Info.plist
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_STRICT_CONCURRENCY: complete
        SWIFT_TREAT_WARNINGS_AS_ERRORS: YES
