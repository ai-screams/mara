name: Release

# 태그(v*) 푸시 시: xcodegen → 빌드 → Developer ID 서명 → 공증 → DMG → GitHub Release 자동 생성.
# 예) git tag v1.0.0 && git push origin v1.0.0
#
# 보안 하드닝:
#  - `environment: release`로 배포를 게이트한다(저장소 설정에서 required reviewer + 환경 한정 secret 지정).
#    현재 1인 조직이라 동일 유지보자의 수동 확인이며 독립 승인은 아니다. 무인 태그 push는 막지만
#    유지보자 계정 전체 탈취까지 방어한다고 과장하지 않는다.
#  - 모든 액션은 commit SHA로 핀(공급망: 태그 변조 방지). 버전 주석은 Dependabot이 갱신한다.
#  - permissions는 최소(contents: write)로만. 게다가 checkout에 persist-credentials: false를 줘서
#    그 쓰기 토큰이 빌드·서명 스텝 전체에 살아있지 않게 한다(권한 수명 최소화).
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # 릴리스 생성/자산 업로드

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false # 진행 중 릴리스를 취소하지 않는다(서명/공증 도중 중단 방지).

jobs:
  release:
    runs-on: macos-15
    # 대표 실행의 러너 구간은 약 161초. 공증 변동은 허용하되 6시간 기본값은 제거한다.
    # (환경 승인 대기는 이 상한에 포함되지 않는다 — job 시작 전이다.)
    timeout-minutes: 45
    environment: release # 배포 승인 게이트(필수 리뷰어는 저장소 Environments 설정에서 지정).
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0 # CFBundleVersion = git 커밋 수(단조 증가)라 전체 히스토리 필요(shallow면 1)
          # TOCTOU 방어: 승인 게이트는 잡 시작 전에 걸리므로, 가변 태그 ref 대신
          # 런 생성 시점의 커밋(github.sha)을 고정 체크아웃한다 — 승인 후 태그를
          # 옮겨도(force-update) 승인된 커밋이 빌드된다. 태그 룰셋(protect-release-tags)과 이중 방어.
          ref: ${{ github.sha }}
          # 이 잡은 릴리스 게시 때문에 contents: write를 갖는다. checkout은 기본값이
          # persist-credentials: true라(핀된 v7.0.0 action.yml에서 확인) 그 쓰기 토큰을 로컬 git
          # 설정에 심어두고, 이후 모든 스텝(brew install create-dmg, xcodegen, SwiftPM, 빌드/서명/
          # 공증 스크립트)이 별도 토큰 전달 없이 인증된 git push를 할 수 있게 된다. 게시 스텝만
          # 권한을 쓰면 충분하므로 자격증명 수명을 끊는다.
          # 안전 확인: release.sh의 git 사용은 describe/rev-list/tag --points-at 뿐이라 전부 로컬
          # 히스토리(fetch-depth: 0으로 이미 받음)이고, SwiftPM은 public Sparkle을 익명 HTTPS로
          # 받는다. 게시는 softprops/action-gh-release가 github.token으로 API 호출 — 로컬 git
          # 자격증명과 무관하다.
          persist-credentials: false

      # 실제 TOCTOU 차단은 위의 ref 핀 + protect-release-tags 룰셋이 담당한다. 이 스텝은
      # checkout 액션 오동작을 잡는 belt-and-suspenders일 뿐, 태그 이동 자체를 감지하지 못한다.
      - name: Assert checked-out commit == run-creation commit
        run: |
          set -euo pipefail
          [ "$(git rev-parse HEAD)" = "${{ github.sha }}" ] || { echo "::error::checked-out commit != run-creation commit"; exit 1; }
          echo "✅ Building approved commit ${{ github.sha }}."

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1
        with:
          # CI와 정확히 같은 compiler. 두 workflow의 값을 한 PR에서 함께 올린다.
          xcode-version: "26.3.0"

      - name: Import Developer ID certificate
        uses: apple-actions/import-codesign-certs@5142e029c445c10ffc7149d172e540235a065466 # v7
        with:
          p12-file-base64: ${{ secrets.DEVELOPER_ID_CERT_P12 }}
          p12-password: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}

      - name: Install XcodeGen (pinned, checksum-verified)
        # ci.yml 과 동일 스크립트 — PR CI 가 이미 이 설치 경로를 실증하므로 릴리스 전에 회귀가 잡힌다.
        run: scripts/install-xcodegen.sh

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Build, sign, notarize, package
        env:
          DEVELOPMENT_TEAM: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          VERSION: ${{ github.ref_name }}
        run: ./scripts/release.sh

      - name: Verify signed/notarized DMG (게시 전 자가검증)
        run: |
          set -euo pipefail
          DMG="$(ls dist/*.dmg)"
          echo "Verifying $DMG"
          spctl -a -t open --context context:primary-signature -vv "$DMG"
          xcrun stapler validate "$DMG"

      - name: Generate SHA-256 checksum
        run: |
          set -euo pipefail
          cd dist
          for f in *.dmg; do shasum -a 256 "$f" > "$f.sha256"; done
          cat ./*.sha256

      - name: Verify update-signing key matches embedded public key
        env:
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          APP_PUB="$(/usr/libexec/PlistBuddy -c 'Print :SUPublicEDKey' build/release/export/Mara.app/Contents/Info.plist)"
          # 서명키가 env에 있는 잡이라, 개인키 옆에서 3rd-party 코드를 돌리지 않는다:
          # pip `cryptography`(+cffi) 다운로드·실행 대신 stdlib-만 파생기를 쓴다(공급망 표면 제거).
          # 스크립트는 매 실행 시 RFC 8032 벡터로 자기검증 후 파생 — 틀리면 여기서 실패(게시 전, fail-safe).
          DERIVED_PUB="$(python3 scripts/ed25519_pub.py)"
          if [ "$APP_PUB" != "$DERIVED_PUB" ]; then
            echo "::error::SUPublicEDKey in app ($APP_PUB) != key derived from SPARKLE_ED_PRIVATE_KEY ($DERIVED_PUB). Clients would reject every update."
            exit 1
          fi
          echo "✅ Signing key matches embedded SUPublicEDKey ($APP_PUB)."

      # Sparkle 자동 업데이트 피드. DMG를 EdDSA 개인키(release 환경 secret)로 서명하고 appcast.xml 생성.
      # 도구(generate_appcast)는 committed Package.resolved revision으로 고정한 Sparkle 아티팩트에서 가져온다 —
      # 별도 tarball 다운로드(미검증)를 없애 서명키 옆에서 도는 코드의 공급망 위험을 제거.
      # 피드는 단일 항목(최신 1건)이며 releases/latest/download/appcast.xml(고정 URL)로 서빙 → "항상 최신 제공" 모델.
      - name: Generate signed Sparkle appcast
        env:
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          # 방어적: 이 스텝이 스텝 순서에 의존하지 않도록 태그 형식을 여기서도 검증한다.
          # release.sh와 **같은 스크립트**를 쓴다 — 예전엔 여기가 셸 glob이라 `v1foo.2bar.3baz`를
          # 통과시켰고, 그래서 "스텝 순서 독립"이라는 이 주석이 사실이 아니었다.
          # `|| { … }`로 감싸 GitHub Actions 에러 어노테이션(::error::)을 유지한다.
          scripts/check-release-version.sh "$GITHUB_REF_NAME" || {
            echo "::error::Refusing invalid release tag for appcast: $GITHUB_REF_NAME"; exit 1; }
          xcodebuild -resolvePackageDependencies \
            -project ./Mara.xcodeproj -scheme Mara \
            -disableAutomaticPackageResolution \
            -derivedDataPath "$RUNNER_TEMP/spm" >/dev/null
          GEN="$(find "$RUNNER_TEMP/spm/SourcePackages/artifacts" -type f -name generate_appcast | head -1)"
          [ -n "$GEN" ] || { echo "generate_appcast not found in SPM-resolved Sparkle artifact"; exit 1; }
          printf '%s' "$SPARKLE_ED_PRIVATE_KEY" | "$GEN" \
            --ed-key-file - \
            --download-url-prefix "https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/" \
            -o dist/appcast.xml \
            dist/
          # 업데이트 창에 "무엇이 바뀌는지"를 보여주도록 이 릴리스의 GitHub 릴리스 노트 페이지를
          # sparkle:releaseNotesLink로 주입한다(태그 페이지는 발행 후 존재 → 사용자 확인 시점엔 유효).
          python3 -c 'import sys,xml.sax.saxutils as x; p="dist/appcast.xml"; repo,tag=sys.argv[1],sys.argv[2]; link=x.escape(f"https://github.com/{repo}/releases/tag/{tag}"); s=open(p).read(); s=(s if "<sparkle:releaseNotesLink>" in s else s.replace("<enclosure ", f"<sparkle:releaseNotesLink>{link}</sparkle:releaseNotesLink>\n            <enclosure ", 1)); open(p,"w").write(s)' "$GITHUB_REPOSITORY" "$GITHUB_REF_NAME"
          echo "appcast.xml generated ($(wc -l < dist/appcast.xml) lines)."

      - name: Create GitHub Release with DMG
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        with:
          files: | # .dmg + .dmg.sha256 + Sparkle 피드
            dist/*.dmg
            dist/*.dmg.sha256
            dist/appcast.xml
          generate_release_notes: true
          fail_on_unmatched_files: true
          # 하이픈 포함 태그(v1.2.0-rc1, -beta 등)는 프리릴리스로 표시 → GitHub "latest" 및
          # releases/latest/download/appcast.xml(Sparkle 피드)에서 자동 제외. 정식 vX.Y.Z만 최신.
          prerelease: ${{ contains(github.ref_name, '-') }}
