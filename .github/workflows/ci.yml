name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build & Test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version

      - name: Run MaraCore unit tests
        run: |
          cd MaraCore
          swift test

      - name: Install XcodeGen (pinned, checksum-verified)
        # release.yml 과 동일 스크립트 — 이 PR CI 가 릴리스와 같은 설치 경로를 실증한다.
        run: scripts/install-xcodegen.sh

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build app (no code signing)
        run: |
          xcodebuild -project Mara.xcodeproj -scheme Mara \
            -configuration Debug CODE_SIGNING_ALLOWED=NO build
