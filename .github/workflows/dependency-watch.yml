name: Dependency Watch

on:
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sparkle:
    name: Sparkle version
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Check latest stable Sparkle
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          scripts/check-sparkle-version.sh --selftest
          scripts/check-sparkle-version.sh
